<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentFlow • Information System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b2a;
            --navy-mid: #1b2d42;
            --navy-light: #2c4263;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #f5f1eb;
            --white: #ffffff;
            --slate: #64748b;
            --border: #d9d3c8;
            --success: #2d6a4f;
            --error: #9b2335;
            --shadow-md: 0 4px 16px rgba(13,27,42,0.1), 0 2px 6px rgba(13,27,42,0.07);
            --shadow-lg: 0 12px 40px rgba(13,27,42,0.14);
            --radius: 4px;
            --radius-md: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            color: var(--navy);
        }

        /* HEADER */
        .site-header {
            background: var(--navy);
            border-bottom: 2px solid var(--gold);
            padding: 0 24px;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-mark {
            width: 32px; height: 32px;
            background: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-family: 'DM Serif Display', serif;
            color: var(--navy); font-size: 1rem;
        }
        .logo-text { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 1.2rem; }
        .logo-sub { color: var(--gold); font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
        .header-badge {
            background: rgba(201,168,76,0.15);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--gold-light);
            font-size: 0.7rem; font-weight: 500;
            letter-spacing: 0.08em; text-transform: uppercase;
            padding: 6px 12px; border-radius: var(--radius);
        }

        /* STATS BAR */
        .stats-bar { background: var(--navy-mid); border-bottom: 1px solid var(--navy-light); }
        .stats-bar-inner {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(4, 1fr);
        }
        .stat-item {
            padding: 16px 24px;
            border-right: 1px solid var(--navy-light);
            display: flex; align-items: center; gap: 14px;
        }
        .stat-item:last-child { border-right: none; }
        .stat-icon-box {
            width: 36px; height: 36px;
            background: rgba(201,168,76,0.12);
            border: 1px solid rgba(201,168,76,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0; border-radius: var(--radius);
        }
        .stat-label {
            font-size: 0.66rem; font-weight: 500;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: rgba(245,241,235,0.45); margin-bottom: 2px;
        }
        .stat-value {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem; color: var(--gold-light); line-height: 1;
        }

        /* MAIN */
        .main {
            max-width: 1200px; margin: 32px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 24px; align-items: start;
        }

        /* CARD */
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .card-header {
            background: var(--navy); padding: 18px 24px;
            display: flex; align-items: center; gap: 10px;
        }
        .card-header-accent { width: 3px; height: 20px; background: var(--gold); border-radius: 2px; flex-shrink: 0; }
        .card-title { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 1rem; }
        .card-body { padding: 28px 24px; }

        /* FORM */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 0.7rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--slate); margin-bottom: 7px;
        }
        .form-label span { color: var(--error); margin-left: 2px; }
        .input-wrap { position: relative; }
        .input-wrap .icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--slate); font-size: 0.9rem; pointer-events: none;
        }
        input[type="text"], input[type="email"], input[type="number"], select {
            width: 100%; padding: 11px 14px 11px 38px;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
            color: var(--navy); background: var(--cream);
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
            appearance: none;
        }
        input:focus, select:focus {
            outline: none; border-color: var(--gold);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }
        input:hover, select:hover { border-color: #b0a898; }
        .form-hint { font-size: 0.7rem; color: var(--slate); margin-top: 5px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .divider { height: 1px; background: var(--border); margin: 24px 0; }

        /* SUBMIT */
        .btn-submit {
            width: 100%; padding: 13px 24px;
            background: var(--navy); color: var(--white);
            border: none; border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
        }
        .btn-submit:hover { background: var(--navy-light); box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* RIGHT */
        .right-col { display: flex; flex-direction: column; gap: 24px; }
        .search-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .search-input-wrap { position: relative; }
        .search-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); color: var(--slate); font-size: 0.9rem;
        }
        .search-input {
            width: 100%; padding: 11px 14px 11px 36px;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
            background: var(--cream); color: var(--navy);
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        .search-input:focus {
            outline: none; border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15); background: var(--white);
        }

        /* DETAIL PANEL */
        .detail-panel { min-height: 260px; display: flex; align-items: center; justify-content: center; }
        .detail-empty { text-align: center; color: var(--slate); }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.35; }
        .empty-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--navy); margin-bottom: 6px; opacity: 0.45; }
        .empty-sub { font-size: 0.8rem; opacity: 0.55; }

        .student-name-heading {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem; color: var(--navy);
            margin-bottom: 20px; padding-bottom: 14px;
            border-bottom: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px;
        }
        .gender-tag {
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 4px 12px; border-radius: 2px;
        }
        .tag-male { background: #dbeafe; color: #1e3a8a; }
        .tag-female { background: #fce7f3; color: #831843; }
        .tag-other { background: #ede9fe; color: #3b0764; }

        .info-table { width: 100%; border-collapse: collapse; }
        .info-table tr { border-bottom: 1px solid var(--border); }
        .info-table tr:last-child { border-bottom: none; }
        .info-table td { padding: 12px 0; font-size: 0.88rem; vertical-align: top; }
        .info-table td:first-child {
            width: 38%; font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--slate); padding-right: 16px;
        }
        .info-table td:last-child { color: var(--navy); font-weight: 500; }
        .marks-bar-wrap { margin-top: 6px; }
        .marks-bar-bg { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .marks-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--navy-light), var(--gold));
            border-radius: 10px;
            transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 28px; right: 28px;
            background: var(--white); border: 1px solid var(--border);
            border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
            padding: 14px 20px; display: none; align-items: center; gap: 12px;
            font-size: 0.88rem; font-weight: 500; z-index: 9999;
            min-width: 280px; max-width: 360px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(16px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-bar { width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0; }
        .toast-success .toast-bar { background: var(--success); }
        .toast-error .toast-bar { background: var(--error); }
        .toast-content { flex: 1; }
        .toast-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
        .toast-success .toast-label { color: var(--success); }
        .toast-error .toast-label { color: var(--error); }
        .toast-msg { color: var(--navy); }

        /* MOBILE */
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; margin: 20px auto; padding: 0 16px; gap: 16px; }
            .stats-bar-inner { grid-template-columns: repeat(2, 1fr); }
            .stat-item:nth-child(2) { border-right: none; }
            .stat-item:nth-child(3) { border-top: 1px solid var(--navy-light); }
            .stat-item:nth-child(4) { border-top: 1px solid var(--navy-light); border-right: none; }
            .search-row { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .header-badge { display: none; }
            .card-body { padding: 20px 16px; }
        }
        @media (max-width: 480px) {
            .stat-item { padding: 12px 16px; }
            .stat-value { font-size: 1.1rem; }
            .student-name-heading { font-size: 1.2rem; }
            .toast { left: 16px; right: 16px; min-width: unset; bottom: 16px; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <div class="logo">
            <div class="logo-mark">S</div>
            <div>
                <div class="logo-text">StudentFlow</div>
                <div class="logo-sub">Information System</div>
            </div>
        </div>
        <div class="header-badge">Academic Records Portal</div>
    </div>
</header>

<div class="stats-bar">
    <div class="stats-bar-inner">
        <div class="stat-item">
            <div class="stat-icon-box">📚</div>
            <div>
                <div class="stat-label">Total Students</div>
                <div class="stat-value" id="totalStudents">—</div>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-icon-box">📊</div>
            <div>
                <div class="stat-label">Average Marks</div>
                <div class="stat-value" id="avgMarks">—</div>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-icon-box">🏆</div>
            <div>
                <div class="stat-label">Highest Marks</div>
                <div class="stat-value" id="maxMarks">—</div>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-icon-box">📉</div>
            <div>
                <div class="stat-label">Lowest Marks</div>
                <div class="stat-value" id="minMarks">—</div>
            </div>
        </div>
    </div>
</div>

<main class="main">

    <!-- FORM -->
    <div class="card">
        <div class="card-header">
            <div class="card-header-accent"></div>
            <div class="card-title">Register New Student</div>
        </div>
        <div class="card-body">
            <form id="studentForm" autocomplete="off">
                <div class="form-group">
                    <label class="form-label">Full Name <span>*</span></label>
                    <div class="input-wrap">
                        <span class="icon">👤</span>
                        <input type="text" name="student_name" required placeholder="e.g. Priya Sharma">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Gender <span>*</span></label>
                        <div class="input-wrap">
                            <span class="icon">⚥</span>
                            <select name="gender" required>
                                <option value="" disabled selected>Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Marks <span>*</span></label>
                        <div class="input-wrap">
                            <span class="icon">📊</span>
                            <input type="number" name="marks" required min="0" max="100" step="0.01" placeholder="0 – 100">
                        </div>
                        <div class="form-hint">Score out of 100</div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">SAP ID <span>*</span></label>
                    <div class="input-wrap">
                        <span class="icon">🆔</span>
                        <input type="text" name="sap_id" required maxlength="11" pattern="\d{11}" placeholder="11-digit numeric ID" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    </div>
                    <div class="form-hint">Exactly 11 digits, numbers only</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Gmail Address <span>*</span></label>
                    <div class="input-wrap">
                        <span class="icon">📧</span>
                        <input type="email" name="gmail" required placeholder="student@gmail.com" pattern="[a-zA-Z0-9._%+\-]+@gmail\.com$" title="Must be a @gmail.com address">
                    </div>
                </div>

                <div class="divider"></div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span>➕</span> Add Student Record
                </button>
            </form>
        </div>
    </div>

    <!-- LOOKUP -->
    <div class="right-col">
        <div class="card">
            <div class="card-header">
                <div class="card-header-accent"></div>
                <div class="card-title">Student Lookup</div>
            </div>
            <div class="card-body">
                <div class="search-row">
                    <div class="search-input-wrap">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-input" id="searchInput" placeholder="Search by name…" oninput="filterStudents()">
                    </div>
                    <div class="input-wrap">
                        <span class="icon">👤</span>
                        <select id="studentSelect" onchange="showSelectedStudent()">
                            <option value="">— Select student —</option>
                            {% for student in students %}
                            <option value="{{ student.id }}">{{ student.student_name }} · {{ student.sap_id }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="divider"></div>

                <div id="studentInfoDisplay" class="detail-panel">
                    <div class="detail-empty">
                        <div class="empty-icon">🎓</div>
                        <div class="empty-title">No student selected</div>
                        <div class="empty-sub">Use the dropdown above to view a student's record</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="toast" class="toast">
    <div class="toast-bar"></div>
    <div class="toast-content">
        <div class="toast-label" id="toastLabel"></div>
        <div class="toast-msg" id="toastMsg"></div>
    </div>
</div>

<script>
    let allOptions = [];

    document.addEventListener('DOMContentLoaded', () => {
        updateStats();
        const sel = document.getElementById('studentSelect');
        for (let i = 1; i < sel.options.length; i++) {
            allOptions.push({ value: sel.options[i].value, text: sel.options[i].text });
        }
    });

    function filterStudents() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const sel = document.getElementById('studentSelect');
        while (sel.options.length > 1) sel.remove(1);
        allOptions.forEach(o => {
            if (o.text.toLowerCase().includes(term)) {
                const opt = document.createElement('option');
                opt.value = o.value; opt.text = o.text;
                sel.appendChild(opt);
            }
        });
    }

    async function showSelectedStudent() {
        const id = document.getElementById('studentSelect').value;
        const panel = document.getElementById('studentInfoDisplay');
        if (!id) {
            panel.innerHTML = `<div class="detail-empty"><div class="empty-icon">🎓</div><div class="empty-title">No student selected</div><div class="empty-sub">Use the dropdown above to view a student's record</div></div>`;
            return;
        }
        panel.innerHTML = `<div class="detail-empty"><div class="empty-sub">Loading…</div></div>`;
        try {
            const res = await fetch(`/get_student/${id}`);
            const s = await res.json();
            if (res.ok) renderStudent(s);
            else showToast('error', 'Error', s.error || 'Could not load student');
        } catch { showToast('error', 'Network Error', 'Please check your connection'); }
    }

    function renderStudent(s) {
        const tagClass = s.gender === 'Male' ? 'tag-male' : s.gender === 'Female' ? 'tag-female' : 'tag-other';
        const pct = Math.min(100, Math.max(0, s.marks));
        const date = new Date(s.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        document.getElementById('studentInfoDisplay').innerHTML = `
            <div style="width:100%">
                <div class="student-name-heading">
                    <span>${esc(s.student_name)}</span>
                    <span class="gender-tag ${tagClass}">${esc(s.gender)}</span>
                </div>
                <table class="info-table">
                    <tr><td>SAP ID</td><td>${esc(s.sap_id)}</td></tr>
                    <tr><td>Gmail</td><td>${esc(s.gmail)}</td></tr>
                    <tr>
                        <td>Marks</td>
                        <td>
                            <strong>${esc(String(s.marks))}</strong> / 100
                            <div class="marks-bar-wrap">
                                <div class="marks-bar-bg"><div class="marks-bar-fill" style="width:${pct}%"></div></div>
                            </div>
                        </td>
                    </tr>
                    <tr><td>Registered</td><td>${date}</td></tr>
                </table>
            </div>`;
    }

    document.getElementById('studentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const fd = new FormData(this);
        const sap = fd.get('sap_id');
        const gmail = fd.get('gmail');
        const marks = parseFloat(fd.get('marks'));

        if (!/^\d{11}$/.test(sap)) { showToast('error', 'Validation Error', 'SAP ID must be exactly 11 digits'); return; }
        if (!gmail.toLowerCase().endsWith('@gmail.com')) { showToast('error', 'Validation Error', 'Email must be a @gmail.com address'); return; }
        if (isNaN(marks) || marks < 0 || marks > 100) { showToast('error', 'Validation Error', 'Marks must be between 0 and 100'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = 'Saving…';

        try {
            const res = await fetch('/add_student', { method: 'POST', body: fd });
            const data = await res.json();
            if (res.ok) {
                showToast('success', 'Record Added', `${data.student.student_name} has been registered`);
                this.reset();
                const sel = document.getElementById('studentSelect');
                const opt = document.createElement('option');
                opt.value = data.student.id;
                opt.text = `${data.student.student_name} · ${data.student.sap_id}`;
                sel.appendChild(opt);
                allOptions.push({ value: String(data.student.id), text: opt.text });
                updateStats();
            } else {
                showToast('error', 'Failed', data.error || 'Could not add student');
            }
        } catch { showToast('error', 'Network Error', 'Please check your connection'); }
        finally {
            btn.disabled = false;
            btn.innerHTML = '<span>➕</span> Add Student Record';
        }
    });

    async function updateStats() {
        try {
            const res = await fetch('/student_stats');
            const d = await res.json();
            if (res.ok) {
                document.getElementById('totalStudents').textContent = d.total_students || '0';
                document.getElementById('avgMarks').textContent = d.avg_marks || '—';
                document.getElementById('maxMarks').textContent = d.max_marks || '—';
                document.getElementById('minMarks').textContent = d.min_marks || '—';
            }
        } catch {}
    }

    function showToast(type, label, msg) {
        const t = document.getElementById('toast');
        t.className = `toast toast-${type}`;
        document.getElementById('toastLabel').textContent = label;
        document.getElementById('toastMsg').textContent = msg;
        t.style.display = 'flex';
        clearTimeout(t._timer);
        t._timer = setTimeout(() => { t.style.display = 'none'; }, 4000);
    }

    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
